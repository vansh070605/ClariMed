name: ClariMed CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest black flake8 mypy

      - name: Lint and Format Check
        run: |
          cd backend
          black --check app tests
          flake8 app tests --ignore=E501

      - name: TypeScript & Static Type Check (Python)
        run: |
          cd backend
          mypy app

      - name: Run Backend Tests
        run: |
          cd backend
          pytest

  frontend-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: ESLint Check
        run: |
          cd frontend
          npm run lint

      - name: Verify TypeScript Compilation & Production Build
        run: |
          cd frontend
          npm run build
